<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NOCTURNE Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060609;--card:#0c0c18;--border:rgba(255,255,255,0.06);--accent:#6C63FF;--green:#30D158;--cyan:#64D2FF;--orange:#FF9F0A;--red:#FF2D55;--pink:#FF6B9D;--purple:#A855F7;--white:#FFF;--dim:#888;--muted:#444;--font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--white);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh;padding-bottom:40px}
.ambient{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 15% 15%,rgba(108,99,255,0.06),transparent 50%),radial-gradient(ellipse at 85% 85%,rgba(255,45,85,0.04),transparent 50%)}
.wrap{max-width:480px;margin:0 auto;padding:0 16px;position:relative;z-index:1}
.header{padding:16px 0 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;background:rgba(6,6,9,0.85);backdrop-filter:blur(16px);margin:0 -16px;padding-left:16px;padding-right:16px}
.logo{font-size:18px;font-weight:900;letter-spacing:-0.5px}
.live-badge{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:14px;background:rgba(48,209,88,0.12);font-size:10px;font-weight:800;color:var(--green);letter-spacing:0.8px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.mode-pills{display:flex;gap:4px;background:rgba(255,255,255,0.04);border-radius:8px;padding:2px}
.mode-pill{padding:6px 12px;border-radius:6px;border:none;background:transparent;color:var(--dim);font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s}
.mode-pill.active{background:rgba(255,255,255,0.08);color:var(--white)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-radius:12px;overflow:hidden;margin:12px 0}
.stat-item{padding:14px 10px;background:var(--card);text-align:center}
.stat-val{font-size:20px;font-weight:800;font-family:var(--mono)}
.stat-lbl{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-top:2px}
.venue-list{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.venue-card{padding:16px;border-radius:12px;background:var(--card);border:1px solid var(--border);transition:border-color 0.3s;cursor:pointer}
.venue-card:active{border-color:rgba(255,255,255,0.12)}
.card-top{display:flex;gap:12px;margin-bottom:10px}
.ring-wrap{position:relative;width:50px;height:50px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;font-family:var(--mono)}
.venue-name{font-size:15px;font-weight:800;letter-spacing:-0.3px}
.venue-meta{font-size:10px;color:var(--dim);font-weight:600;margin:1px 0 5px}
.status-row{display:flex;align-items:center;gap:6px}
.status-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;letter-spacing:0.4px}
.count-text{font-size:11px;color:var(--dim);font-family:var(--mono)}
.delta{font-size:10px;font-weight:700}
.delta.up{color:var(--green)}.delta.down{color:var(--red)}
.spark-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sources{display:flex;gap:3px;flex-wrap:wrap}
.src-pill{font-size:9px;padding:1px 6px;border-radius:6px;font-weight:700}
.card-foot{display:flex;gap:10px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:9px;color:var(--dim)}
.cap-alert{margin-top:8px;padding:5px 8px;border-radius:6px;background:rgba(255,45,85,0.08);font-size:9px;color:var(--red);font-weight:700}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:90;backdrop-filter:blur(3px)}
.overlay.open{display:block}
.detail{display:none;position:fixed;bottom:0;left:0;right:0;max-height:85vh;background:linear-gradient(180deg,#0e0e1c,#08080f);border-top-left-radius:20px;border-top-right-radius:20px;z-index:100;overflow-y:auto;padding:20px 20px 40px;animation:slideUp 0.25s ease}
.detail.open{display:block}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.detail-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);margin:0 auto 16px}
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.detail-type{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}
.detail-name{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.detail-addr{font-size:11px;color:var(--dim);margin-top:2px}
.close-btn{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.06);border:none;color:var(--dim);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.big-occ{display:flex;align-items:center;gap:16px;padding:16px;border-radius:14px;margin-bottom:16px}
.big-count{font-size:28px;font-weight:800;line-height:1}
.big-count span{font-size:14px;color:var(--dim)}
.big-delta{font-size:11px;color:var(--dim);margin-top:3px}
.section-lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.signal-row{margin-bottom:6px}
.signal-head{display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px}
.signal-bar{height:3px;border-radius:2px;background:rgba(255,255,255,0.04)}
.signal-fill{height:100%;border-radius:2px;transition:width 0.5s}
.demo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.demo-box{padding:12px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid var(--border)}
.demo-box-lbl{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:6px}
.insight-box{padding:14px;border-radius:10px;margin-bottom:12px}
.insight-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.insight-lbl{font-size:8px;color:var(--muted);font-weight:700}
.insight-val{font-size:15px;font-weight:800}
.footer{text-align:center;padding:24px 0 8px;font-size:9px;color:#222}
</style>
</head>
<body>
<div class="ambient"></div>
<div class="wrap">
  <div class="header">
    <div style="display:flex;align-items:center;gap:8px">
      <span class="logo">NOCTURNE</span>
      <div class="live-badge"><span class="live-dot"></span>DEMO</div>
    </div>
    <div class="mode-pills">
      <button class="mode-pill active" onclick="setMode('explorer')">Explorer</button>
      <button class="mode-pill" onclick="setMode('owner')">Owner</button>
    </div>
  </div>
  <div class="stats" id="statsBar"></div>
  <div class="venue-list" id="venueList"></div>
  <div class="footer">NOCTURNE · Downtown Fullerton · usenocturne.ai</div>
</div>
<div class="overlay" id="overlay" onclick="closeDetail()"></div>
<div class="detail" id="detail"><div class="detail-handle"></div><div id="detailContent"></div></div>
<script>
var VENUES=[
  {id:1,name:"Back Alley",type:"Live Music",capacity:143,address:"110 E Walnut Ave",zip:"92832",cover:0},
  {id:2,name:"Hopscotch",type:"Whiskey Bar",capacity:208,address:"110 E Commonwealth Ave",zip:"92832",cover:0},
  {id:3,name:"Roscoe's",type:"Bar & Restaurant",capacity:328,address:"116 W Commonwealth Ave",zip:"92832",cover:0},
  {id:4,name:"Madero",type:"Latin Fusion / Club",capacity:250,address:"111 N Harbor Blvd",zip:"92832",cover:0},
  {id:5,name:"High Horse Saloon",type:"Country Bar",capacity:301,address:"122 E Commonwealth Ave",zip:"92832",cover:0},
  {id:11,name:"Mickey's Irish Pub",type:"Irish Pub",capacity:200,address:"122 E Commonwealth Ave",zip:"92832",cover:0},
  {id:6,name:"Cantina Urbana Kalaveras",type:"Latin / Dancing",capacity:224,address:"122 E Commonwealth Ave",zip:"92832",cover:0},
  {id:7,name:"Chako's Social",type:"Lounge",capacity:299,address:"E Commonwealth Ave",zip:"92832",cover:0},
  {id:8,name:"The Charleston",type:"Upscale Lounge",capacity:234,address:"110 E Commonwealth Ave",zip:"92832",cover:0},
  {id:9,name:"Heroes",type:"Bar & Restaurant",capacity:336,address:"E Commonwealth Ave",zip:"92832",cover:0},
  {id:10,name:"Ziing",type:"Nightclub",capacity:500,address:"215 N Pomona Ave",zip:"92832",cover:10}
];
var mode="explorer";var venues=[];var selectedId=null;
function occColor(o){return o>0.85?"#FF2D55":o>0.65?"#FF9F0A":o>0.4?"#30D158":"#64D2FF"}
function occLabel(o){return o>0.85?"PACKED":o>0.65?"BUSY":o>0.4?"LIVELY":"CHILL"}
function sim(v){
  var h=new Date().getHours();
  var base=h>=22||h<2?0.75:h>=19?0.55:h>=17?0.35:0.2;
  var occ=Math.min(1,Math.max(0.05,base+(Math.random()-0.5)*0.35));
  var cnt=Math.round(occ*v.capacity);
  var trend=[];for(var i=0;i<12;i++)trend.push(Math.max(0,Math.min(1,base-0.3+i*0.05+(Math.random()-0.5)*0.15)));
  return Object.assign({},v,{
    occupancy:occ,count:cnt,status:occLabel(occ),trend:trend,
    sources:{WiFi:20+Math.floor(Math.random()*20),GPS:5+Math.floor(Math.random()*10)},
    delta:Math.round((Math.random()-0.4)*20),
    wait:occ>0.85?20:occ>0.65?10:occ>0.4?5:0,
    peakTime:(10+Math.floor(Math.random()*2))+":"+(Math.random()>0.5?"30":"00")+" PM",
    avgDwell:45+Math.floor(Math.random()*60),
    confidence:0.4+Math.random()*0.4
  });
}
function sparkSVG(data,color,w,h){
  if(!data||!data.length)return"";
  var max=Math.max.apply(null,data),min=Math.min.apply(null,data),r=max-min||1;
  var pts=data.map(function(v,i){return(i/(data.length-1))*w+","+(h-((v-min)/r)*(h-2))}).join(" ");
  return'<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+" "+h+'" style="display:block;opacity:0.9"><polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linejoin="round"/></svg>';
}
function ringSVG(val,size){
  var r=(size-6)/2,circ=2*Math.PI*r,color=occColor(val);
  return'<div class="ring-wrap" style="width:'+size+"px;height:"+size+'px"><svg width="'+size+'" height="'+size+'" style="transform:rotate(-90deg)"><circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="4"/><circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="4" stroke-dasharray="'+circ+'" stroke-dashoffset="'+circ*(1-val)+'" stroke-linecap="round" style="transition:stroke-dashoffset 0.8s,stroke 0.4s"/></svg><div class="ring-pct" style="color:'+color+'">'+Math.round(val*100)+'</div></div>';
}
function renderStats(){
  var total=venues.reduce(function(a,v){return a+v.count},0);
  var avg=venues.length?venues.reduce(function(a,v){return a+v.occupancy},0)/venues.length:0;
  var top=venues.slice().sort(function(a,b){return b.occupancy-a.occupancy})[0];
  document.getElementById("statsBar").innerHTML=
    '<div class="stat-item"><div class="stat-val" style="color:var(--accent)">'+total+'</div><div class="stat-lbl">People Out</div></div>'+
    '<div class="stat-item"><div class="stat-val" style="color:'+occColor(avg)+'">'+Math.round(avg*100)+'%</div><div class="stat-lbl">Avg Occ</div></div>'+
    '<div class="stat-item"><div class="stat-val" style="color:var(--red)">'+(top?top.name.split("/")[0].split(" ").slice(0,2).join(" "):"--")+'</div><div class="stat-lbl">Hottest</div></div>';
}
function renderList(){
  var srcColors={WiFi:"#A855F7",GPS:"#30D158"};
  var html="";
  var sorted=venues.slice().sort(function(a,b){return b.occupancy-a.occupancy});
  sorted.forEach(function(v){
    var c=occColor(v.occupancy);
    var totalSrc=Object.values(v.sources).reduce(function(a,b){return a+b},0)||1;
    var pills="";
    Object.keys(v.sources).forEach(function(k){
      if(v.sources[k]>0)pills+='<span class="src-pill" style="background:'+(srcColors[k]||"#888")+'14;color:'+(srcColors[k]||"#888")+';border:1px solid '+(srcColors[k]||"#888")+'22">'+k+" "+Math.round(v.sources[k]/totalSrc*100)+"%</span>";
    });
    var foot="";
    if(mode==="explorer"){
      foot='<div class="card-foot"><span>Wait: '+v.wait+' min</span><span>Cover: '+(v.cover>0?"$"+v.cover:"Free")+'</span><span>Peak: '+v.peakTime+'</span></div>';
    }else if(mode==="owner"&&v.occupancy>0.8){
      foot='<div class="cap-alert">Approaching capacity. Consider one-in-one-out.</div>';
    }
    html+='<div class="venue-card" onclick="openDetail('+v.id+')">'+
      '<div class="card-top">'+ringSVG(v.occupancy,50)+
      '<div style="flex:1;min-width:0"><div class="venue-name">'+v.name+'</div>'+
      '<div class="venue-meta">'+v.type+' · Cap: '+v.capacity+'</div>'+
      '<div class="status-row"><span class="status-badge" style="background:'+c+'18;color:'+c+'">'+v.status+'</span>'+
      '<span class="count-text">'+v.count+'/'+v.capacity+'</span>'+
      '<span class="delta '+(v.delta>0?"up":"down")+'">'+(v.delta>0?"+":"")+v.delta+'</span></div></div></div>'+
      '<div class="spark-row">'+sparkSVG(v.trend,c,200,24)+'</div>'+
      '<div class="sources">'+pills+'</div>'+foot+'</div>';
  });
  document.getElementById("venueList").innerHTML=html;
}
function openDetail(id){
  var v=venues.find(function(x){return x.id===id});
  if(!v)return;selectedId=id;
  var c=occColor(v.occupancy);
  var totalSrc=Object.values(v.sources).reduce(function(a,b){return a+b},0)||1;
  var srcColors={WiFi:"#A855F7",GPS:"#30D158"};
  var signals="";
  Object.keys(v.sources).forEach(function(k){
    var pct=v.sources[k]/totalSrc;
    signals+='<div class="signal-row"><div class="signal-head"><span style="color:'+(srcColors[k]||"#888")+';font-weight:700">'+k+'</span><span style="color:var(--dim);font-family:var(--mono);font-size:9px">'+v.sources[k]+' signals · '+Math.round(pct*100)+'%</span></div><div class="signal-bar"><div class="signal-fill" style="width:'+pct*100+'%;background:'+(srcColors[k]||"#888")+'"></div></div></div>';
  });
  var modeInsight="";
  if(mode==="explorer"){
    modeInsight='<div class="insight-box" style="background:rgba(108,99,255,0.06);border:1px solid rgba(108,99,255,0.12)"><div class="insight-title" style="color:var(--accent)">Tonight</div><div class="insight-grid"><div><div class="insight-lbl">Est. Wait</div><div class="insight-val">'+v.wait+' min</div></div><div><div class="insight-lbl">Cover</div><div class="insight-val">'+(v.cover>0?"$"+v.cover:"Free")+'</div></div><div><div class="insight-lbl">Peak</div><div class="insight-val">'+v.peakTime+'</div></div><div><div class="insight-lbl">Avg Stay</div><div class="insight-val">'+v.avgDwell+' min</div></div></div></div>';
  }else{
    var alert=v.occupancy>0.85?'<div style="padding:8px;border-radius:6px;background:rgba(255,45,85,0.08);border:1px solid rgba(255,45,85,0.15);margin-bottom:8px;font-size:11px;color:var(--red);font-weight:700">Near capacity. Activate one-in-one-out.</div>':"";
    modeInsight='<div class="insight-box" style="background:rgba(48,209,88,0.06);border:1px solid rgba(48,209,88,0.12)"><div class="insight-title" style="color:var(--green)">Venue Ops</div>'+alert+'<div style="font-size:11px;color:#aaa;line-height:1.5">Peak projected at <strong style="color:#fff">'+v.peakTime+'</strong>. WiFi signals: '+v.sources.WiFi+'. GPS pings: '+v.sources.GPS+'. Confidence: '+Math.round(v.confidence*100)+'%.</div></div>';
  }
  document.getElementById("detailContent").innerHTML=
    '<div class="detail-header"><div><div class="detail-type" style="color:'+c+'">'+v.type+' · '+v.status+'</div><div class="detail-name">'+v.name+'</div><div class="detail-addr">'+v.address+', Fullerton 92832</div></div><button class="close-btn" onclick="closeDetail()">X</button></div>'+
    '<div class="big-occ" style="background:linear-gradient(135deg,'+c+'0c,'+c+'04);border:1px solid '+c+'18">'+ringSVG(v.occupancy,68)+'<div><div class="big-count">'+v.count+'<span> / '+v.capacity+'</span></div><div class="big-delta">'+(v.delta>0?"+":"")+v.delta+' in last 15 min</div></div></div>'+
    '<div style="margin-bottom:16px"><div class="section-lbl">Tonight\'s Trend</div>'+sparkSVG(v.trend,c,320,50)+'<div style="display:flex;justify-content:space-between;font-size:8px;color:var(--muted);margin-top:3px"><span>6 PM</span><span>9 PM</span><span>12 AM</span><span>Now</span></div></div>'+
    '<div style="margin-bottom:16px"><div class="section-lbl">Signal Sources · '+totalSrc+' total</div>'+signals+'</div>'+
    '<div class="demo-grid"><div class="demo-box"><div class="demo-box-lbl">Capacity</div><div style="font-size:22px;font-weight:800;color:'+c+'">'+Math.round(v.occupancy*100)+'%</div><div style="font-size:9px;color:var(--muted)">'+v.count+' of '+v.capacity+'</div></div><div class="demo-box"><div class="demo-box-lbl">Confidence</div><div style="font-size:22px;font-weight:800;color:'+(v.confidence>0.6?"var(--green)":"var(--orange)")+'">'+Math.round(v.confidence*100)+'%</div><div style="font-size:9px;color:var(--muted)">signal strength</div></div></div>'+
    modeInsight;
  document.getElementById("overlay").classList.add("open");
  document.getElementById("detail").classList.add("open");
}
function closeDetail(){document.getElementById("overlay").classList.remove("open");document.getElementById("detail").classList.remove("open");selectedId=null;}
function setMode(m){mode=m;document.querySelectorAll(".mode-pill").forEach(function(el,i){el.classList.toggle("active",["explorer","owner"][i]===m)});renderList();if(selectedId)openDetail(selectedId);}
function update(){venues=VENUES.map(sim);renderStats();renderList();}
update();setInterval(update,3000);
</script>
</body>
</html>
