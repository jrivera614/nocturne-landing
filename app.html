<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NOCTURNE">
<meta name="theme-color" content="#060609">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<title>NOCTURNE - What's busy tonight?</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060609;--card:#0c0c18;--border:rgba(255,255,255,0.06);--accent:#6C63FF;--green:#30D158;--cyan:#64D2FF;--orange:#FF9F0A;--red:#FF2D55;--white:#FFF;--dim:#888;--muted:#444;--font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--white);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh;padding-bottom:80px}
.ambient{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 15% 15%,rgba(108,99,255,0.06),transparent 50%),radial-gradient(ellipse at 85% 85%,rgba(255,45,85,0.04),transparent 50%)}
.wrap{max-width:480px;margin:0 auto;padding:0 16px;position:relative;z-index:1}

/* Header */
.header{padding:54px 0 8px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;background:rgba(6,6,9,0.92);backdrop-filter:blur(20px);margin:0 -16px;padding-left:16px;padding-right:16px}
.logo-row{display:flex;align-items:center;gap:6px}
.logo{font-size:18px;font-weight:900;letter-spacing:-0.5px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.location-tag{font-size:10px;color:var(--dim);font-weight:600}

/* Hero */
.hero{padding:16px 0 8px}
.hero-title{font-size:28px;font-weight:900;letter-spacing:-1px;line-height:1.1}
.hero-sub{font-size:13px;color:var(--dim);margin-top:6px}

/* Area pulse */
.area-card{padding:14px 16px;border-radius:12px;margin:12px 0;display:flex;align-items:center;gap:12px}
.area-dot-big{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.area-label{font-size:15px;font-weight:700}
.area-sub{font-size:10px;color:var(--dim);margin-top:1px}

/* Filters */
.filters{display:flex;gap:6px;overflow-x:auto;padding:8px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-pill{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0}
.filter-pill.active{background:rgba(108,99,255,0.15);border-color:rgba(108,99,255,0.3);color:var(--accent)}

/* Venue list */
.venue-list{display:flex;flex-direction:column;gap:10px;margin-top:10px}
.v-card{padding:14px;border-radius:12px;background:var(--card);border:1px solid var(--border);cursor:pointer;transition:border-color 0.2s}
.v-card:active{border-color:rgba(255,255,255,0.1)}
.v-top{display:flex;gap:12px;align-items:center}
.v-ring{position:relative;width:48px;height:48px;flex-shrink:0}
.v-ring svg{transform:rotate(-90deg)}
.v-ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;font-family:var(--mono)}
.v-info{flex:1;min-width:0}
.v-name{font-size:15px;font-weight:800;letter-spacing:-0.3px}
.v-type{font-size:10px;color:var(--dim);font-weight:600;margin-top:1px}
.v-status-row{display:flex;align-items:center;gap:6px;margin-top:4px}
.v-badge{font-size:8px;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:0.3px}
.v-count{font-size:10px;color:var(--dim);font-family:var(--mono)}
.v-right{text-align:right;flex-shrink:0}
.v-wait{font-size:18px;font-weight:800;font-family:var(--mono)}
.v-wait-lbl{font-size:8px;color:var(--muted);font-weight:700;text-transform:uppercase}

/* Sparkline row */
.v-spark{margin:8px 0 4px;height:20px}

/* Detail overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:90;backdrop-filter:blur(3px)}
.overlay.open{display:block}
.detail{display:none;position:fixed;bottom:0;left:0;right:0;max-height:88vh;background:linear-gradient(180deg,#0e0e1c,#08080f);border-top-left-radius:20px;border-top-right-radius:20px;z-index:100;overflow-y:auto;padding:20px 20px 40px;animation:slideUp 0.25s ease}
.detail.open{display:block}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.detail-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);margin:0 auto 16px}
.d-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.d-type{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px}
.d-name{font-size:22px;font-weight:900;letter-spacing:-0.5px}
.d-addr{font-size:11px;color:var(--dim);margin-top:2px}
.close-btn{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.06);border:none;color:var(--dim);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.d-big{display:flex;align-items:center;gap:16px;padding:16px;border-radius:14px;margin-bottom:14px}
.d-count{font-size:32px;font-weight:900;font-family:var(--mono);line-height:1}
.d-count span{font-size:14px;color:var(--dim)}
.d-delta{font-size:11px;color:var(--dim);margin-top:3px}
.d-section{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin:14px 0 8px}
.d-stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.d-stat{padding:10px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid var(--border);text-align:center}
.d-stat-val{font-size:16px;font-weight:800;font-family:var(--mono)}
.d-stat-lbl{font-size:8px;color:var(--muted);font-weight:700;margin-top:2px}
.d-trend{height:60px;display:flex;align-items:flex-end;gap:2px;padding:8px;border-radius:10px;background:var(--card);border:1px solid var(--border);margin-bottom:6px;position:relative}
.d-trend-labels{display:flex;justify-content:space-between;font-size:7px;color:var(--muted);margin-bottom:12px}
.d-vibe{padding:12px;border-radius:10px;background:var(--card);border:1px solid var(--border);font-size:12px;color:var(--dim);line-height:1.5}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(6,6,9,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:center;gap:40px;padding:10px 0 24px;z-index:80}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;color:var(--muted);font-family:var(--font);transition:color 0.2s}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:18px}
.nav-label{font-size:9px;font-weight:700}
</style>
</head>
<body>
<div class="ambient"></div>
<div class="wrap">
  <div class="header">
    <div class="logo-row">
      <span class="logo">NOCTURNE</span>
      <span class="live-dot"></span>
    </div>
    <span class="location-tag">Downtown Fullerton</span>
  </div>

  <div class="hero">
    <div class="hero-title">What's busy<br>tonight?</div>
    <div class="hero-sub">Live crowd levels across downtown. Updated every 60 seconds.</div>
  </div>

  <div id="areaCard"></div>

  <div class="filters" id="filters"></div>

  <div class="venue-list" id="venueList"></div>
</div>

<div class="bottom-nav">
  <button class="nav-item active"><span class="nav-icon">&#9898;</span><span class="nav-label">Explore</span></button>
  <button class="nav-item"><span class="nav-icon">&#9733;</span><span class="nav-label">Saved</span></button>
  <button class="nav-item"><span class="nav-icon">&#9881;</span><span class="nav-label">Settings</span></button>
</div>

<div class="overlay" id="overlay" onclick="closeDetail()"></div>
<div class="detail" id="detail"><div class="detail-handle"></div><div id="detailContent"></div></div>

<script>
var VENUES=[
  {id:1,name:"Back Alley",type:"Live Music",capacity:143,address:"110 E Walnut Ave",cover:0,tags:["live music","dancing"]},
  {id:2,name:"Hopscotch",type:"Whiskey Bar",capacity:208,address:"110 E Commonwealth Ave",cover:0,tags:["cocktails","chill"]},
  {id:3,name:"Roscoe's",type:"Bar & Restaurant",capacity:328,address:"116 W Commonwealth Ave",cover:0,tags:["food","sports"]},
  {id:4,name:"Madero",type:"Latin Fusion / Club",capacity:250,address:"111 N Harbor Blvd",cover:0,tags:["latin","dancing","food"]},
  {id:5,name:"High Horse Saloon",type:"Country Bar",capacity:301,address:"122 E Commonwealth Ave",cover:0,tags:["country","dancing"]},
  {id:11,name:"Mickey's Irish Pub",type:"Irish Pub",capacity:200,address:"122 E Commonwealth Ave",cover:0,tags:["chill","sports"]},
  {id:6,name:"Cantina Urbana Kalaveras",type:"Latin / Dancing",capacity:224,address:"122 E Commonwealth Ave",cover:0,tags:["latin","dancing","live music"]},
  {id:7,name:"Chako's Social",type:"Lounge",capacity:299,address:"E Commonwealth Ave",cover:0,tags:["lounge","cocktails"]},
  {id:8,name:"The Charleston",type:"Upscale Lounge",capacity:234,address:"110 E Commonwealth Ave",cover:0,tags:["upscale","cocktails"]},
  {id:9,name:"Heroes",type:"Bar & Restaurant",capacity:336,address:"E Commonwealth Ave",cover:0,tags:["food","sports","chill"]},
  {id:10,name:"Ziing",type:"Nightclub",capacity:500,address:"215 N Pomona Ave",cover:10,tags:["dancing","club"]}
];

var venues=[];var activeFilter="all";var selectedId=null;

var allTags=["all","dancing","live music","cocktails","latin","chill","food","sports","upscale"];

function occColor(o){return o>0.85?"#FF2D55":o>0.65?"#FF9F0A":o>0.4?"#30D158":"#64D2FF"}
function occLabel(o){return o>0.85?"PACKED":o>0.65?"BUSY":o>0.4?"LIVELY":"CHILL"}

function sim(v){
  var h=new Date().getHours();
  var base=h>=22||h<2?0.78:h>=20?0.6:h>=18?0.4:0.15;
  var occ=Math.min(0.98,Math.max(0.05,base+(Math.random()-0.5)*0.3));
  var cnt=Math.round(occ*v.capacity);
  var trend=[];
  for(var i=0;i<18;i++){trend.push(Math.max(0,Math.min(1,base-0.35+i*0.04+(Math.random()-0.5)*0.1)));}
  return Object.assign({},v,{
    occupancy:occ,count:cnt,status:occLabel(occ),trend:trend,
    delta:Math.round((Math.random()-0.4)*15),
    wait:occ>0.85?20:occ>0.65?10:occ>0.4?5:0,
    peakTime:(10+Math.floor(Math.random()*2))+":"+(Math.random()>0.5?"30":"00")+" PM",
    avgDwell:45+Math.floor(Math.random()*60),
    vibe:occ>0.7?"Loud, high energy, packed dance floor":occ>0.5?"Good energy, filling up, music is on":"Relaxed, easy to get a drink, plenty of space"
  });
}

function sparkSVG(data,color,w,h){
  if(!data||!data.length)return"";
  var max=Math.max.apply(null,data),min=Math.min.apply(null,data),r=max-min||1;
  var pts=data.map(function(v,i){return(i/(data.length-1))*w+","+(h-((v-min)/r)*(h-2))}).join(" ");
  return'<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+" "+h+'" style="display:block;opacity:0.8"><polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linejoin="round"/></svg>';
}

function ringSVG(val,size){
  var r=(size-6)/2,circ=2*Math.PI*r,color=occColor(val);
  return'<div class="v-ring" style="width:'+size+'px;height:'+size+'px"><svg width="'+size+'" height="'+size+'" style="transform:rotate(-90deg)"><circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="3.5"/><circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="3.5" stroke-dasharray="'+circ+'" stroke-dashoffset="'+circ*(1-val)+'" stroke-linecap="round" style="transition:all 0.8s"/></svg><div class="v-ring-pct" style="color:'+color+'">'+Math.round(val*100)+'</div></div>';
}

function renderFilters(){
  var html="";
  allTags.forEach(function(t){
    var label=t==="all"?"All":t.charAt(0).toUpperCase()+t.slice(1);
    html+='<button class="filter-pill'+(activeFilter===t?" active":"")+'" onclick="setFilter(\''+t+'\')">'+label+'</button>';
  });
  document.getElementById("filters").innerHTML=html;
}

function renderArea(){
  var avg=venues.length?venues.reduce(function(a,v){return a+v.occupancy},0)/venues.length:0;
  var c=occColor(avg);
  var label=avg>0.65?"Downtown is buzzing tonight":avg>0.4?"Downtown has a good vibe tonight":"Downtown is chill tonight";
  document.getElementById("areaCard").innerHTML=
    '<div class="area-card" style="background:'+c+'0a;border:1px solid '+c+'18"><div class="area-dot-big" style="background:'+c+';box-shadow:0 0 10px '+c+'"></div><div><div class="area-label" style="color:'+c+'">'+label+'</div><div class="area-sub">'+venues.length+' venues tracked · '+venues.reduce(function(a,v){return a+v.count},0)+' people out</div></div></div>';
}

function renderList(){
  var filtered=venues;
  if(activeFilter!=="all"){
    filtered=venues.filter(function(v){return v.tags&&v.tags.indexOf(activeFilter)>=0});
  }
  var sorted=filtered.slice().sort(function(a,b){return b.occupancy-a.occupancy});
  var html="";
  sorted.forEach(function(v){
    var c=occColor(v.occupancy);
    html+='<div class="v-card" onclick="openDetail('+v.id+')">'+
      '<div class="v-top">'+ringSVG(v.occupancy,48)+
      '<div class="v-info"><div class="v-name">'+v.name+'</div>'+
      '<div class="v-type">'+v.type+'</div>'+
      '<div class="v-status-row"><span class="v-badge" style="background:'+c+'18;color:'+c+'">'+v.status+'</span>'+
      '<span class="v-count">'+v.count+'/'+v.capacity+'</span></div></div>'+
      '<div class="v-right"><div class="v-wait" style="color:'+(v.wait>10?'var(--red)':v.wait>5?'var(--orange)':'var(--green)')+'">'+v.wait+'</div><div class="v-wait-lbl">min wait</div></div>'+
      '</div>'+
      '<div class="v-spark">'+sparkSVG(v.trend,c,320,18)+'</div>'+
      '</div>';
  });
  if(sorted.length===0){
    html='<div style="text-align:center;padding:40px 0;color:var(--muted);font-size:13px">No venues match this filter</div>';
  }
  document.getElementById("venueList").innerHTML=html;
}

function openDetail(id){
  var v=venues.find(function(x){return x.id===id});
  if(!v)return;selectedId=id;
  var c=occColor(v.occupancy);

  var trendBars="";
  v.trend.forEach(function(t){
    var h=Math.max(4,t*48);
    trendBars+='<div style="flex:1;background:'+occColor(t)+'30;border-radius:3px 3px 0 0;height:'+h+'px;min-width:3px"></div>';
  });

  document.getElementById("detailContent").innerHTML=
    '<div class="d-header"><div><div class="d-type" style="color:'+c+'">'+v.type+' · '+v.status+'</div><div class="d-name">'+v.name+'</div><div class="d-addr">'+v.address+', Fullerton</div></div><button class="close-btn" onclick="closeDetail()">X</button></div>'+
    '<div class="d-big" style="background:'+c+'0a;border:1px solid '+c+'18">'+ringSVG(v.occupancy,60)+'<div><div class="d-count">'+v.count+'<span> / '+v.capacity+'</span></div><div class="d-delta" style="color:'+(v.delta>0?'var(--green)':'var(--red)')+'">'+(v.delta>0?'+':'')+v.delta+' in last 15 min</div></div></div>'+
    '<div class="d-stat-row"><div class="d-stat"><div class="d-stat-val" style="color:'+(v.wait>10?'var(--red)':v.wait>5?'var(--orange)':'var(--green)')+'">'+v.wait+'</div><div class="d-stat-lbl">Min Wait</div></div><div class="d-stat"><div class="d-stat-val" style="color:var(--cyan)">'+(v.cover>0?'$'+v.cover:'Free')+'</div><div class="d-stat-lbl">Cover</div></div><div class="d-stat"><div class="d-stat-val" style="color:var(--orange)">'+v.peakTime+'</div><div class="d-stat-lbl">Est. Peak</div></div></div>'+
    '<div class="d-section">Tonight\'s Crowd</div>'+
    '<div class="d-trend">'+trendBars+'</div>'+
    '<div class="d-trend-labels"><span>6 PM</span><span>8 PM</span><span>10 PM</span><span>Now</span></div>'+
    '<div class="d-section">Vibe Check</div>'+
    '<div class="d-vibe">'+v.vibe+'</div>'+
    '<div style="margin-top:14px;padding:12px;border-radius:10px;background:rgba(108,99,255,0.06);border:1px solid rgba(108,99,255,0.12);text-align:center"><span style="font-size:12px;color:var(--accent);font-weight:700">Avg Stay: '+v.avgDwell+' min</span><span style="font-size:10px;color:var(--dim);margin-left:12px">Cover: '+(v.cover>0?'$'+v.cover:'Free')+'</span></div>';

  document.getElementById("overlay").classList.add("open");
  document.getElementById("detail").classList.add("open");
}

function closeDetail(){
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("detail").classList.remove("open");
  selectedId=null;
}

function setFilter(f){
  activeFilter=f;
  renderFilters();
  renderList();
}

function update(){
  venues=VENUES.map(sim);
  renderArea();
  renderList();
}

renderFilters();
update();
setInterval(update,4000);
</script>
</body>
</html>
